<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaNave - Registro</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container" id="register-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h2>Crear Cuenta</h2>
                <p>Únete a nuestra plataforma, atleta</p>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="reg-username" required placeholder=" ">
                    <label for="reg-username">Nombre de usuario</label>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" required placeholder=" ">
                    <label for="reg-email">Correo electrónico</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" required placeholder=" ">
                    <label for="reg-password">Contraseña</label>
                </div>
                <div id="reg-error-message" class="error-message"></div>
                <div id="reg-success-message" class="hidden"
                    style="background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(34, 197, 94, 0.3); font-size: 0.9rem;">
                </div>
                <button type="submit" id="reg-submit-btn" class="btn-primary">
                    <span class="btn-text">Registrarse</span>
                    <span class="spinner"></span>
                </button>
                <div class="form-footer">
                    <p>¿Ya tienes cuenta? <a href="../login/index.html" id="show-login">Inicia sesión</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
